<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BET-IA GASY | Analyse de Ticket 101%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif;
            background-color: #0b0f19; /* Bleu très sombre / Noir */
            color: #ffffff;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .bet-gradient {
            background: linear-gradient(90deg, #facc15 0%, #eab308 100%);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #facc15;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <header class="text-center mb-8">
        <div class="inline-block p-3 rounded-2xl bg-yellow-500/10 mb-4">
            <span class="text-4xl">🚀</span>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight">
            BET-IA <span class="text-yellow-500 text-shadow-lg">GASY</span>
        </h1>
        <p class="text-gray-400 text-sm mt-2">L'Intelligence Artificielle au service des parieurs 🇲🇬</p>
    </header>

    <main class="w-full max-w-md">
        <div class="glass-card p-6 shadow-2xl">
            <form action="/" method="POST" enctype="multipart/form-data" id="betForm">
                <div class="mb-6">
                    <label class="block text-gray-300 text-sm font-semibold mb-3">
                        Envoie la capture de ton ticket :
                    </label>
                    <div class="relative group">
                        <input type="file" name="file" accept="image/*" required id="fileInput"
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="border-2 border-dashed border-gray-600 group-hover:border-yellow-500 rounded-xl p-8 text-center transition-all">
                            <span class="text-gray-500 text-sm" id="fileName">Clique ici pour choisir l'image</span>
                        </div>
                    </div>
                </div>

                <button type="submit" onclick="showLoader()"
                    class="w-full bet-gradient text-black font-extrabold py-4 rounded-xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    <span id="btnText">ANALYSER MAINTENANT</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
        </div>

        {% if resultat %}
        <div class="mt-8 glass-card p-6 animate-fade-in border-t-4 border-yellow-500 shadow-yellow-500/10 shadow-2xl">
            <div class="flex items-center gap-2 mb-4 text-yellow-500">
                <span class="text-xl">📊</span>
                <h2 class="font-bold text-lg">Verdict de l'IA :</h2>
            </div>
            
            <div class="text-gray-200 text-sm leading-relaxed whitespace-pre-wrap italic">
                {{ resultat }}
            </div>

            <a href="/" class="block mt-6 text-center text-xs text-gray-500 hover:text-yellow-500 underline underline-offset-4">
                Analyser un autre ticket
            </a>
        </div>
        {% endif %}
    </main>

    <footer class="mt-12 text-center text-gray-600 text-[10px] uppercase tracking-widest">
        &copy; 2026 Reaction Gasy Tech - Madagascar
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileName.innerText = e.target.files[0].name;
                fileName.classList.add('text-yellow-500');
            }
        });

        function showLoader() {
            if (fileInput.files.length > 0) {
                document.getElementById('btnText').innerText = "ANALYSE EN COURS...";
                document.getElementById('loader').style.display = "block";
            }
        }
    </script>

</body>
</html>i
